
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    
    <!-- SEO & Open Graph -->
    <title>Victor Cardoso | Engenharia de Software & Design</title>
    <meta name="description" content="Engenharia de software de alta precisão e design de interface. Portfólio documental." />
    <meta name="theme-color" content="#000000" />

    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Montserrat:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;700&display=swap" rel="stylesheet">

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Montserrat', 'sans-serif'],
              serif: ['Cormorant Garamond', 'serif'],
              mono: ['JetBrains Mono', 'monospace'],
              inter: ['Inter', 'sans-serif'],
            },
            colors: {
              paper: '#FFFFFF', // Pure White
              petrol: {
                base: '#000000', // Pure Black
                mid: '#1A1A1A',  // Very Dark Gray
                ink: '#333333',  // Dark Gray
                accent: '#E5E5E5', // Light Gray
                electric: '#999999', // Mid Gray
              },
            },
            backgroundImage: {
              'petrol-gradient': 'linear-gradient(135deg, #000000 0%, #111111 100%)',
              'title-gradient': 'linear-gradient(to right, #000000, #333333)', 
            },
            screens: {
              'xs': '475px',
              '3xl': '1920px',
            },
            letterSpacing: {
              tighter: '-0.04em',
            },
            // Container queries config simulation for spacing
            spacing: {
              'section-mobile': '4rem',
              'section-desktop': '8rem',
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --ease-cinematic: cubic-bezier(0.76, 0, 0.24, 1);
      }
      
      body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #FFFFFF;
        color: #000000;
        overflow-x: hidden;
        width: 100%;
      }

      /* Konami Code / Hacker Mode Theme Override */
      body.hacker-mode {
        background-color: #000000;
        color: #FFFFFF;
      }
      body.hacker-mode .bg-paper { background-color: #000000 !important; }
      body.hacker-mode .text-petrol-base { color: #FFFFFF !important; }
      body.hacker-mode .text-petrol-ink { color: #CCCCCC !important; }
      body.hacker-mode border-petrol-base { border-color: #FFFFFF !important; }
      
      /* Typography Utils */
      .font-heading-fluid {
        font-size: clamp(3rem, 10vw, 9rem);
        line-height: 0.9;
      }

      /* Custom scrollbar - Refined */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(0, 0, 0, 0.2);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(0, 0, 0, 0.6);
      }

      /* Lenis & Layout Fixes */
      html.lenis, html.lenis body { height: auto; }
      .lenis.lenis-smooth { scroll-behavior: auto !important; }
      .lenis.lenis-smooth [data-lenis-prevent] { overscroll-behavior: contain; }
      .lenis.lenis-stopped { overflow: hidden; }

      .staggered-menu-wrapper { position: relative; z-index: 9990; }
    </style>
  <script type="importmap">

    "clsx": "https://cdn.jsdelivr.net/npm/clsx@2.1.0/+esm",
    "tailwind-merge": "https://cdn.jsdelivr.net/npm/tailwind-merge@2.2.1/+esm",
    "lenis": "https://cdn.jsdelivr.net/npm/lenis@1.1.20/+esm",
    "framer-motion": "https://aistudiocdn.com/framer-motion@^11.16.0",

  }
}
</script>
