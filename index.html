
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    
    <!-- SEO & Open Graph -->
    <title>Victor Cardoso | Engenharia de Software & Design</title>
    <meta name="description" content="Engenharia de software de alta precisão e design de interface. Portfólio documental." />
    <meta name="theme-color" content="#0B232E" />

    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts -->
    <link href="https://api.fontshare.com/v2/css?f[]=zodiak@100,200,300,400,500,600,700,800,900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Zodiak', 'serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              paper: '#F2F4F6', // Ice Grey / Paper White
              petrol: {
                base: '#0B232E', // Deep Petrol (Primary Dark)
                mid: '#153A48',  // Mid tone
                ink: '#1E3A45',  // Text Ink
                accent: '#CBD5E1', // Cool Silver
                electric: '#78909C', // Muted Blue Grey
              },
            },
            backgroundImage: {
              'petrol-gradient': 'linear-gradient(135deg, #0B232E 0%, #0F2A36 100%)',
              'title-gradient': 'linear-gradient(to right, #0B232E, #153A48)', 
            },
            screens: {
              'xs': '475px',
              '3xl': '1920px',
            },
            // Container queries config simulation for spacing
            spacing: {
              'section-mobile': '4rem',
              'section-desktop': '8rem',
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --ease-cinematic: cubic-bezier(0.76, 0, 0.24, 1);
      }
      
      body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #F2F4F6;
        color: #0B232E;
        overflow-x: hidden;
        width: 100%;
      }

      /* Konami Code / Hacker Mode Theme Override */
      body.hacker-mode {
        background-color: #0d0208;
        color: #00ff41;
      }
      body.hacker-mode .bg-paper { background-color: #0d0208 !important; }
      body.hacker-mode .text-petrol-base { color: #00ff41 !important; }
      body.hacker-mode .text-petrol-ink { color: #008F11 !important; }
      body.hacker-mode border-petrol-base { border-color: #00ff41 !important; }
      
      /* Typography Utils */
      .font-heading-fluid {
        font-size: clamp(3rem, 10vw, 9rem);
        line-height: 0.9;
      }

      /* Custom scrollbar - Refined */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(11, 35, 46, 0.2);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(11, 35, 46, 0.6);
      }

      /* Lenis & Layout Fixes */
      html.lenis, html.lenis body { height: auto; }
      .lenis.lenis-smooth { scroll-behavior: auto !important; }
      .lenis.lenis-smooth [data-lenis-prevent] { overscroll-behavior: contain; }
      .lenis.lenis-stopped { overflow: hidden; }

      .staggered-menu-wrapper { position: relative; z-index: 9990; }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.1",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",
    "react/": "https://aistudiocdn.com/react@^19.2.1/",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.555.0",
    "clsx": "https://cdn.jsdelivr.net/npm/clsx@2.1.0/+esm",
    "tailwind-merge": "https://cdn.jsdelivr.net/npm/tailwind-merge@2.2.1/+esm",
    "lenis": "https://cdn.jsdelivr.net/npm/lenis@1.1.20/+esm",
    "framer-motion": "https://aistudiocdn.com/framer-motion@^11.16.0",
    "react-dom": "https://esm.sh/react-dom@^19.2.1"
  }
}
</script>
</head>
  <body class="bg-paper text-petrol-base antialiased">
    <div id="root"></div>
    <!-- CRITICAL FIX: Ensure the src points exactly to where your index.tsx is located.
         In many Vite setups this is /src/index.tsx, but per your prompt file structure it is /index.tsx -->
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
